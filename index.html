<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaTime - Доставка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* ================= CSS СТИЛІ ТА АНІМАЦІЇ ================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            height: 40vh;
            /* Ідеальне фото для банера (темна піца) */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200&q=80') center/cover;
            padding: 20px;
        }

        .shadow-text { text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--bs-border-color);
            border-radius: 15px;
            overflow: hidden;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            background-color: #f8f9fa;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .nav-link, .theme-toggle { cursor: pointer; transition: 0.3s ease; }
        .theme-toggle { font-size: 1.2rem; color: #ffc107; }
        .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }

        @media (min-width: 768px) { .hero-section { height: 50vh; } }
        @media (min-width: 992px) { .hero-section { height: 60vh; } .product-img { height: 220px; } }
    </style>
</head>
<body>

    <!-- ================= НАВІГАЦІЯ ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" onclick="switchPage('home')" style="cursor: pointer;">
                <i class="bi bi-pie-chart-fill"></i> PizzaTime
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-white nav-tab fw-semibold" id="tab-home" onclick="switchPage('home')">Головна</a></li>
                    <li class="nav-item"><a class="nav-link nav-tab fw-semibold" id="tab-menu" onclick="switchPage('menu')">Меню</a></li>
                    <li class="nav-item"><a class="nav-link nav-tab fw-semibold" id="tab-orders" onclick="switchPage('orders')">Мої замовлення</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <i class="bi bi-sun-fill theme-toggle" id="theme-icon" onclick="toggleTheme()" title="Змінити тему"></i>
                    <button class="btn btn-warning position-relative fw-bold" data-bs-toggle="modal" data-bs-target="#cartModal">
                        <i class="bi bi-cart3"></i> Кошик
                        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ================= СТОРІНКА 1: ГОЛОВНА ================= -->
    <div id="page-home" class="page-section fade-in">
        <header class="hero-section text-center text-white d-flex align-items-center justify-content-center">
            <div class="container">
                <h1 class="display-3 fw-bold shadow-text mb-3">PizzaTime - Більше ніж піца!</h1>
                <p class="lead shadow-text mb-4 fs-4">Швидка доставка, найкращі інгредієнти та неймовірний смак.</p>
                <button onclick="switchPage('menu')" class="btn btn-warning btn-lg fw-bold shadow">Перейти до меню</button>
            </div>
        </header>
        <main class="container my-5">
            <h2 class="text-center fw-bold mb-4">🔥 Хіти продажу</h2>
            <div class="row" id="recommended-container"></div>
        </main>
    </div>

    <!-- ================= СТОРІНКА 2: МЕНЮ ================= -->
    <div id="page-menu" class="page-section d-none">
        <main class="container my-5">
            <h2 class="text-center fw-bold mb-4">Наше Меню</h2>
            <div class="d-flex justify-content-center flex-wrap gap-2 mb-4" id="filters">
                <button class="btn btn-secondary active" onclick="filterProducts('all')">Всі товари</button>
                <button class="btn btn-outline-secondary" onclick="filterProducts('pizza')">🍕 Піци</button>
                <button class="btn btn-outline-secondary" onclick="filterProducts('drinks')">🥤 Напої</button>
                <button class="btn btn-outline-secondary" onclick="filterProducts('desserts')">🍰 Десерти</button>
                <button class="btn btn-outline-secondary" onclick="filterProducts('icecream')">🍦 Морозиво</button>
            </div>
            <div class="row" id="products-container"></div>
        </main>
    </div>

    <!-- ================= СТОРІНКА 3: ІСТОРІЯ ЗАМОВЛЕНЬ ================= -->
    <div id="page-orders" class="page-section d-none">
        <main class="container my-5">
            <h2 class="text-center fw-bold mb-4"><i class="bi bi-clock-history"></i> Історія замовлень</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8" id="orders-container"></div>
            </div>
        </main>
    </div>

    <!-- ================= МОДАЛЬНЕ ВІКНО КОШИКА ================= -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark border-0">
                    <h5 class="modal-title fw-bold">Ваше замовлення</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body">
                    <div id="cart-items" class="mb-3"></div>
                    <div class="d-flex justify-content-between fw-bold fs-5 border-top pt-3">
                        <span>Загальна сума:</span><span id="cart-total" class="text-danger">0 ₴</span>
                    </div>
                    <form id="checkout-form" class="mt-4 border-top pt-3 d-none">
                        <div class="mb-2"><input type="text" class="form-control" placeholder="Ім'я" required></div>
                        <div class="mb-2"><input type="tel" class="form-control" placeholder="Телефон" required></div>
                        <div class="mb-2"><input type="text" class="form-control" placeholder="Адреса доставки" required></div>
                        <button type="submit" class="btn btn-success w-100 mt-3 fw-bold py-2 shadow-sm">Оформити замовлення</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        let cart = JSON.parse(localStorage.getItem('pizzaCart')) || [];
        let ordersHistory = JSON.parse(localStorage.getItem('pizzaOrders')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderCards(products.filter(p => p.recommended), 'recommended-container');
            renderCards(products, 'products-container');
            updateCartUI();
            renderOrders();
            document.getElementById('checkout-form').addEventListener('submit', handleCheckout);
        });

        // === ТЕМНА/СВІТЛА ТЕМА ===
        function initTheme() {
            const savedTheme = localStorage.getItem('pizzaTheme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('pizzaTheme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            icon.className = theme === 'dark' ? 'bi bi-moon-stars-fill theme-toggle text-info' : 'bi bi-sun-fill theme-toggle text-warning';
        }

        // === НАВІГАЦІЯ ТА АНІМАЦІЇ ===
        function switchPage(pageId) {
            document.querySelectorAll('.page-section').forEach(sec => {
                sec.classList.remove('fade-in');
                sec.classList.add('d-none');
            });
            
            const activePage = document.getElementById('page-' + pageId);
            activePage.classList.remove('d-none');
            void activePage.offsetWidth; 
            activePage.classList.add('fade-in');

            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('text-white'));
            document.getElementById('tab-' + pageId).classList.add('text-white');

            const navbarCollapse = document.getElementById('navbarNav');
            if (navbarCollapse.classList.contains('show')) new bootstrap.Collapse(navbarCollapse).hide();
            if (pageId === 'orders') renderOrders();
        }

        // === ВІДОБРАЖЕННЯ ТОВАРІВ (Без "глюку" з піцою) ===
        function renderCards(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            items.forEach(product => {
                container.innerHTML += `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4 d-flex">
                        <div class="card product-card bg-body-tertiary w-100">
                            <img src="${product.image}" class="card-img-top product-img" alt="${product.name}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title fw-bold">${product.name}</h5>
                                <p class="card-text text-body-secondary small flex-grow-1">${product.description}</p>
                                <div class="d-flex justify-content-between align-items-center mt-3 border-top pt-3 border-secondary-subtle">
                                    <span class="fs-5 fw-bold text-danger">${product.price} ₴</span>
                                    <button class="btn btn-warning fw-bold text-dark shadow-sm" onclick="addToCart(${product.id})">
                                        <i class="bi bi-cart-plus"></i> В кошик
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Фільтрація
        function filterProducts(category) {
            document.querySelectorAll('#filters button').forEach(btn => {
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-outline-secondary');
            });
            event.target.classList.remove('btn-outline-secondary');
            event.target.classList.add('btn-secondary');

            renderCards(category === 'all' ? products : products.filter(p => p.category === category), 'products-container');
        }

        // === ЛОГІКА КОШИКА ===
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });

            saveCart();
            updateCartUI();
            
            const badge = document.getElementById('cart-badge');
            badge.classList.add('bg-success');
            badge.style.transform = "scale(1.3)";
            setTimeout(() => {
                badge.classList.remove('bg-success');
                badge.style.transform = "translate(-50%, -50%)"; 
            }, 300);
        }

        function changeQuantity(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.id !== productId);
                saveCart();
                updateCartUI();
            }
        }

        function saveCart() { localStorage.setItem('pizzaCart', JSON.stringify(cart)); }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
            const itemsCont = document.getElementById('cart-items');
            const form = document.getElementById('checkout-form');

            if (cart.length === 0) {
                itemsCont.innerHTML = '<p class="text-center text-body-secondary my-4">Кошик порожній 🛒</p>';
                document.getElementById('cart-total').innerText = '0 ₴';
                form.classList.add('d-none');
                return;
            }

            form.classList.remove('d-none');
            itemsCont.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                itemsCont.innerHTML += `
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary-subtle pb-2">
                        <div>
                            <h6 class="mb-0 fw-bold">${item.name}</h6>
                            <small class="text-body-secondary">${item.price} ₴ x ${item.quantity}</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-danger qty-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span class="fw-bold align-self-center mx-1">${item.quantity}</span>
                            <button class="btn btn-sm btn-outline-success qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `${total} ₴`;
        }

        // === ОФОРМЛЕННЯ ЗАМОВЛЕННЯ ===
        function handleCheckout(e) {
            e.preventDefault();
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            ordersHistory.unshift({
                id: Math.floor(Math.random() * 90000) + 10000, 
                date: new Date().toLocaleString('uk-UA'),
                items: [...cart],
                totalPrice: total
            });

            localStorage.setItem('pizzaOrders', JSON.stringify(ordersHistory));
            cart = [];
            saveCart();
            updateCartUI();
            e.target.reset();

            bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
            switchPage('orders');
        }

        // === ІСТОРІЯ ЗАМОВЛЕНЬ ===
        function renderOrders() {
            const container = document.getElementById('orders-container');
            if (ordersHistory.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-secondary text-center shadow-sm">
                        <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
                        <h5 class="fw-bold">Ви ще нічого не замовляли</h5>
                        <button onclick="switchPage('menu')" class="btn btn-warning mt-2 fw-bold shadow-sm">Перейти до меню</button>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            ordersHistory.forEach(order => {
                let itemsHTML = order.items.map(i => `<li>${i.name} <span class="text-body-secondary">(x${i.quantity})</span></li>`).join('');
                container.innerHTML += `
                    <div class="card mb-4 shadow-sm bg-body-tertiary border-0 border-start border-warning border-5">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary-subtle pb-2">
                                <span class="fw-bold fs-5">Замовлення #<span class="text-warning">${order.id}</span></span>
                                <span class="badge bg-success shadow-sm fs-6">Успішно</span>
                            </div>
                            <p class="mb-2 text-body-secondary"><i class="bi bi-calendar3"></i> ${order.date}</p>
                            <ul class="mb-3 ps-3 fw-medium">${itemsHTML}</ul>
                            <h4 class="fw-bold mb-0 text-end text-danger">Разом: ${order.totalPrice} ₴</h4>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
